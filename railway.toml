# railway.toml — AIOS deployment config for Railway.
# Reference: https://docs.railway.com/guides/config-as-code
#
# Required env vars (set via Railway dashboard or CLI `railway variables`):
#   SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY, VOYAGE_API_KEY, ANTHROPIC_API_KEY,
#   TRIGIFY_API_KEY, APOLLO_API_KEY, HUNTER_API_KEY, ZEROBOUNCE_API_KEY,
#   CRON_SECRET, CLIENT_ID
#
# Without all of these set, `api.main:create_app()` raises at import time
# (config/settings.py hard-requires them). Railway will surface the error in
# deploy logs.

[build]
builder = "nixpacks"

# Playwright needs its browser binaries installed separately from the Python
# package. claude_identity_scraper, claude_deep_research, and the planned
# ad-library scrapers all require Chromium. Without this step, any Playwright
# call raises "Executable doesn't exist at .../chromium" at runtime.
# Closes backlog item 19.
buildCommand = "uv sync --frozen && uv run playwright install --with-deps chromium"

[deploy]
startCommand = "uvicorn api.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

# Scout daemon service (Task 16.6). Long-running worker that iterates
# active clients and runs the nightly pipeline. Uses the same build +
# env as the web service. Daemon-level dry-run: set AIOS_DAEMON_DRY_RUN=true
# in env. Override cron via AIOS_DAEMON_CRON (default "0 2 * * *" UTC).

[[services]]
name = "scout-daemon"
startCommand = "uv run python -m aios.daemon"
restartPolicyType = "always"
